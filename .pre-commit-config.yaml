# Local hooks run through npm scripts, so the tool versions come from
# package-lock.json and always match CI (`npm run check`) exactly.
# Install with: uvx pre-commit install
repos:
  - repo: local
    hooks:
      - id: eslint
        name: eslint
        entry: npm run lint
        language: system
        types_or: [javascript, jsx, ts, tsx]
        pass_filenames: false
      - id: typecheck
        name: tsc --noEmit
        entry: npm run typecheck
        language: system
        types_or: [ts, tsx]
        pass_filenames: false
      - id: data-validate
        name: validate canonical data records
        entry: npm run data:validate
        language: system
        files: ^data/
        pass_filenames: false
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
