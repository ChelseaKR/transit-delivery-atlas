# Scheduled full-history verified-secret scan. A diff-scoped scan only ever sees
# the commits in a single push/PR; a secret committed further back in history and
# later removed would never trip it. This job walks the *entire* history weekly,
# in verified-credentials mode, and fails loudly.
name: secret-scan-scheduled

on:
  schedule:
    - cron: "23 6 * * 1" # weekly, Monday 06:23 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trufflehog-full-history:
    name: TruffleHog full-history scan (verified credentials only)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Run TruffleHog over the full git history
        uses: trufflesecurity/trufflehog@00155c9dc586f34d189adc83d3ac2698c2ec551f # v3.95.8
        with:
          # No base/head: on schedule/workflow_dispatch the action scans the
          # whole repository history, not a diff.
          extra_args: --results=verified --no-update
