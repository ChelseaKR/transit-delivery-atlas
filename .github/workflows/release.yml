# Trusted-main release. Deployment already happens continuously from main
# (deploy.yml); this workflow makes a version a first-class, auditable artifact:
# it re-runs the full release gate (`npm run check`) at the exact tagged commit,
# refuses a tag whose version has no CHANGELOG section, and publishes the built
# static-site export as a GitHub Release asset.
name: release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing signed stable SemVer tag (vX.Y.Z)"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  authorize:
    uses: ChelseaKR/portfolio-standards/.github/workflows/release-authorize.yml@3692aa5270d673f91f8571b4fc0ce1c622bf67e5
    permissions:
      contents: read
    with:
      tag: ${{ inputs.tag }}

  build:
    name: verify exact commit · build site archive
    needs: authorize
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Check out the tagged commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.authorize.outputs.release-commit }}
          persist-credentials: false

      - name: CHANGELOG carries a section for this tag
        # A release must not tag a commit whose CHANGELOG has no matching
        # `## [X.Y.Z]` section. GITHUB_REF_NAME is the runner-provided env var
        # (no `${{ }}` interpolation — template-injection-safe).
        env:
          TAG: ${{ needs.authorize.outputs.release-tag }}
        run: |
          VERSION="${TAG#v}"
          grep -Fq "## [${VERSION}]" CHANGELOG.md || {
            echo "CHANGELOG.md has no '## [${VERSION}]' section for tag ${TAG}" >&2
            exit 1
          }

      - name: Tag version must match package.json
        env:
          TAG: ${{ needs.authorize.outputs.release-tag }}
        run: |
          VERSION="${TAG#v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [ "$VERSION" != "$PKG_VERSION" ]; then
            echo "Tag ${TAG} (version ${VERSION}) does not match package.json version ${PKG_VERSION}" >&2
            exit 1
          fi

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.19.0

      - name: Install locked dependencies
        run: npm ci

      - name: Re-run the full release gate at the tagged commit
        run: npm run check
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: Archive the static-site export
        env:
          TAG: ${{ needs.authorize.outputs.release-tag }}
        run: |
          tar -czf "transit-delivery-atlas-${TAG}-site.tar.gz" -C out .

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-assets
          path: transit-delivery-atlas-*-site.tar.gz
          if-no-files-found: error

  publish-release:
    needs: [authorize, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-assets
          path: release-assets
      - name: Recheck immutable tag object and publish the site archive
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.authorize.outputs.release-tag }}
          TAG_OBJECT_SHA: ${{ needs.authorize.outputs.tag-object-sha }}
        run: |
          set -euo pipefail
          LIVE_TAG_OBJECT="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${TAG}" --jq .object.sha)"
          test "${LIVE_TAG_OBJECT}" = "${TAG_OBJECT_SHA}"
          gh release create "${TAG}" release-assets/* \
            --title "transit-delivery-atlas ${TAG}" \
            --generate-notes --verify-tag
