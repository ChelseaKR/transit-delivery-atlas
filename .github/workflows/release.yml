# Tag-triggered release. Deployment already happens continuously from main
# (deploy.yml); this workflow makes a version a first-class, auditable artifact:
# it re-runs the full release gate (`npm run check`) at the exact tagged commit,
# refuses a tag whose version has no CHANGELOG section, and publishes the built
# static-site export as a GitHub Release asset.
name: release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: verify at tag · build · publish GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write # create the GitHub release and upload the site archive
    steps:
      - name: Check out the tagged commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: CHANGELOG carries a section for this tag
        # A release must not tag a commit whose CHANGELOG has no matching
        # `## [X.Y.Z]` section. GITHUB_REF_NAME is the runner-provided env var
        # (no `${{ }}` interpolation — template-injection-safe).
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          grep -Fq "## [${VERSION}]" CHANGELOG.md || {
            echo "CHANGELOG.md has no '## [${VERSION}]' section for tag ${GITHUB_REF_NAME}" >&2
            exit 1
          }

      - name: Tag version must match package.json
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [ "$VERSION" != "$PKG_VERSION" ]; then
            echo "Tag ${GITHUB_REF_NAME} (version ${VERSION}) does not match package.json version ${PKG_VERSION}" >&2
            exit 1
          fi

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.19.0
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Re-run the full release gate at the tagged commit
        run: npm run check
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: Archive the static-site export
        run: |
          tar -czf "transit-delivery-atlas-${GITHUB_REF_NAME}-site.tar.gz" -C out .

      - name: Publish GitHub Release with the site archive
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 \
            || gh release create "$GITHUB_REF_NAME" \
                 --title "transit-delivery-atlas $GITHUB_REF_NAME" \
                 --generate-notes
          gh release upload "$GITHUB_REF_NAME" \
            "transit-delivery-atlas-${GITHUB_REF_NAME}-site.tar.gz" --clobber
